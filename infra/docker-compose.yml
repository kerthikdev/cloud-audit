version: "3.9"

services:
  mongo:
    image: mongo:7
    container_name: cloudaudit_mongo
    restart: unless-stopped
    volumes:
      - mongodata:/data/db
    ports:
      - "27017:27017"

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: cloudaudit_backend
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      MONGODB_URI: mongodb://mongo:27017
      MONGODB_DB_NAME: cloudaudit
    depends_on:
      - mongo
    expose:
      - "8000"

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: cloudaudit_frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  mongodata: